<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedOffice AI — Scheduler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #f0f4f8; min-height: 100vh; }

    .topbar {
      background: linear-gradient(135deg, #0a1628 0%, #0e3d52 60%, #0a5a5a 100%);
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .topbar-logo-glow { animation: topLogoGlow 3s ease-in-out infinite; }
    @keyframes topLogoGlow {
      0%,100% { box-shadow: 0 0 10px rgba(13,148,136,0.3); }
      50%      { box-shadow: 0 0 24px rgba(13,148,136,0.7); }
    }

    .appt-row {
      background: white;
      border-radius: 14px;
      border-left: 4px solid;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: all 0.25s ease;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .appt-row:hover { transform: translateX(4px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .appt-row.selected { outline: 2px solid #0d9488; outline-offset: 1px; }

    .appt-row.blue    { border-color: #3b82f6; }
    .appt-row.orange  { border-color: #f59e0b; }
    .appt-row.pink    { border-color: #ec4899; }
    .appt-row.red     { border-color: #ef4444; }
    .appt-row.purple  { border-color: #8b5cf6; }
    .appt-row.teal    { border-color: #0d9488; }
    .appt-row.green   { border-color: #10b981; }
    .appt-row.slate   { border-color: #64748b; }

    .status-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      white-space: nowrap; cursor: pointer;
      transition: all .2s;
    }
    .status-badge:hover { filter: brightness(0.9); }
    .status-completed   { background: #f0fdf4; color: #059669; }
    .status-in-progress { background: #fffbeb; color: #d97706; animation: pulseBg 2s infinite; }
    .status-upcoming    { background: #f8fafc; color: #64748b; }
    .status-cancelled   { background: #fef2f2; color: #dc2626; }

    @keyframes pulseBg {
      0%,100% { background: #fffbeb; }
      50%      { background: #fef3c7; }
    }

    .appear { opacity:0; transform:translateY(16px); animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    .d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
    .d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
    .d7{animation-delay:.35s}.d8{animation-delay:.4s}.d9{animation-delay:.45s}
    .d10{animation-delay:.5s}.d11{animation-delay:.55s}

    .avatar { width:36px;height:36px; border-radius:50%; display:flex;align-items:center;
              justify-content:center; font-weight:800; font-size:13px; color:white; flex-shrink:0; }

    .status-dot {
      width:8px;height:8px;border-radius:50%;background:#10b981;
      position:absolute;bottom:0;right:0;border:2px solid #0e3d52;
      animation:statusPulse 2s ease infinite;
    }
    @keyframes statusPulse {
      0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4);}
      50%{box-shadow:0 0 0 5px rgba(16,185,129,0);}
    }

    .week-day { border-radius: 10px; padding: 8px 12px; text-align: center;
                cursor: pointer; transition: all .2s; }
    .week-day:hover { background: #e2e8f0; }
    .week-day.active { background: linear-gradient(135deg,#0e5570,#0d9488); color:white;
                       box-shadow:0 4px 12px rgba(13,148,136,.3); }
    .week-day.active .day-num,.week-day.active .day-name { color:white; }
    .day-num  { font-size:18px; font-weight:800; color:#1e293b; }
    .day-name { font-size:11px; font-weight:600; color:#94a3b8; margin-top:2px; }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="dashboard.html" class="flex items-center gap-1.5 text-white/50 hover:text-white transition-colors text-sm font-medium mr-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          Dashboard
        </a>
        <div class="topbar-logo-glow w-9 h-9 rounded-xl flex items-center justify-center"
             style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div>
          <div class="text-white font-bold text-base leading-none">Smart Scheduler</div>
          <div class="text-teal-300 text-xs mt-0.5 font-medium">Ottawa Family Health Team</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="avatar" id="av" style="background:linear-gradient(135deg,#0d9488,#06b6d4)">AP</div>
          <div class="status-dot"></div>
        </div>
        <button onclick="logout()" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-white/60 hover:text-white hover:bg-white/10 transition-colors flex items-center gap-1.5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- Header row -->
    <div class="flex items-center justify-between mb-6 flex-wrap gap-4 appear d1">
      <div>
        <h1 class="text-2xl font-black text-slate-900">Today's Schedule</h1>
        <p class="text-slate-500 text-sm mt-1" id="todayLabel">Loading…</p>
      </div>
      <div class="flex items-center gap-3" id="statusBadges">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Week mini-calendar -->
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-6 appear d2">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <button class="p-1.5 rounded-lg hover:bg-slate-100 transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span class="font-bold text-slate-800" id="weekLabel">This Week</span>
          <button class="p-1.5 rounded-lg hover:bg-slate-100 transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="grid grid-cols-7 gap-2" id="weekGrid">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Appointment List + Side Panel -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Appointments -->
      <div class="lg:col-span-2" id="apptList">
        <div class="flex items-center justify-center py-16">
          <div class="text-center text-slate-400">
            <div class="w-10 h-10 border-2 border-teal-300 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            <p class="text-sm font-medium">Loading appointments…</p>
          </div>
        </div>
      </div>

      <!-- Side panel -->
      <div class="lg:col-span-1 space-y-4">

        <!-- Daily summary -->
        <div class="bg-white rounded-2xl shadow-sm p-5 appear d3">
          <h3 class="font-bold text-slate-800 mb-4">Day Summary</h3>
          <div class="space-y-3" id="summaryStats">
            <div class="text-slate-400 text-sm text-center py-4">Loading…</div>
          </div>
          <div class="mt-4 pt-4 border-t border-slate-100">
            <div class="flex justify-between text-xs text-slate-500 mb-2">
              <span class="font-semibold">Day progress</span>
              <span class="font-bold text-slate-700" id="progressPct">0%</span>
            </div>
            <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div id="progressBar" class="h-full rounded-full transition-all duration-700"
                   style="width:0%;background:linear-gradient(90deg,#0d9488,#059669)"></div>
            </div>
          </div>
        </div>

        <!-- AI Suggestions -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden appear d4">
          <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center"
                 style="background:linear-gradient(135deg,#0e5570,#0d9488)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <span class="font-bold text-slate-800 text-sm">AI Suggestions</span>
            <span class="ml-auto text-xs bg-teal-50 text-teal-600 px-2 py-0.5 rounded-full font-semibold">Live</span>
          </div>
          <div id="aiSuggestions" class="divide-y divide-slate-50">
            <div class="px-5 py-6 text-center text-slate-400 text-xs font-medium">Loading suggestions…</div>
          </div>
        </div>

        <!-- Quick actions -->
        <div class="bg-white rounded-2xl shadow-sm p-5 appear d5">
          <h3 class="font-bold text-slate-800 mb-3 text-sm">Quick Actions</h3>
          <div class="space-y-2">
            <a href="index.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-colors">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:#f0fdfa">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
              </div>
              <span class="text-sm font-semibold text-slate-700">Fill a Form with AI</span>
              <svg class="ml-auto" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
            <a href="referral.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-colors">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:#faf5ff">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
              </div>
              <span class="text-sm font-semibold text-slate-700">Check a Referral</span>
              <svg class="ml-auto" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
            <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-colors">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:#f0fdf4">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              </div>
              <span class="text-sm font-semibold text-slate-700">Back to Dashboard</span>
              <svg class="ml-auto" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    const API = 'http://localhost:8000/api';
    requireAuth();

    // ── Helpers ──────────────────────────────────────────────────────────
    const AVATAR_GRADS = {
      blue:  'linear-gradient(135deg,#3b82f6,#6366f1)',
      orange:'linear-gradient(135deg,#f59e0b,#ef4444)',
      pink:  'linear-gradient(135deg,#ec4899,#a855f7)',
      red:   'linear-gradient(135deg,#ef4444,#f97316)',
      purple:'linear-gradient(135deg,#8b5cf6,#ec4899)',
      teal:  'linear-gradient(135deg,#0d9488,#059669)',
      green: 'linear-gradient(135deg,#10b981,#0d9488)',
      slate: 'linear-gradient(135deg,#64748b,#475569)',
    };

    function statusBadgeHTML(apptId, status) {
      const configs = {
        completed:   { cls: 'status-completed',   label: '✓ Done',        next: null },
        'in-progress':{ cls:'status-in-progress', label: '● In Progress', next: 'completed' },
        upcoming:    { cls: 'status-upcoming',     label: 'Upcoming',     next: 'in-progress' },
        cancelled:   { cls: 'status-cancelled',    label: '✕ Cancelled',  next: null },
      };
      const cfg = configs[status] || configs.upcoming;
      const title = cfg.next ? `Click to mark as ${cfg.next}` : '';
      const onclick = cfg.next ? `updateStatus(${apptId}, '${cfg.next}')` : '';
      return `<span class="status-badge ${cfg.cls}" title="${title}" onclick="${onclick}">${cfg.label}</span>`;
    }

    function riskPillHTML(level, highCount) {
      const cfg = {
        HIGH:   { bg:'#fef2f2', color:'#dc2626', border:'#fecaca', icon:'⚠', label:'Critical' },
        MEDIUM: { bg:'#fffbeb', color:'#d97706', border:'#fde68a', icon:'●', label:'Moderate' },
        LOW:    { bg:'#f0fdf4', color:'#059669', border:'#bbf7d0', icon:'✓', label:'Routine'  },
      };
      const c = cfg[level] || cfg.LOW;
      const count = (level === 'HIGH' && highCount > 0)
        ? ` · ${highCount} flag${highCount > 1 ? 's' : ''}` : '';
      return `<span style="font-size:10px;padding:2px 9px;border-radius:20px;font-weight:800;white-space:nowrap;
        background:${c.bg};color:${c.color};border:1px solid ${c.border}">${c.icon} ${c.label}${count}</span>`;
    }

    function apptRowHTML(a) {
      const [hhmm] = a.time.split(':');
      const hNum = parseInt(hhmm);
      const ampm = hNum >= 12 ? 'PM' : 'AM';
      const h12  = hNum % 12 || 12;
      const min  = a.time.split(':')[1];
      const grad = AVATAR_GRADS[a.color] || AVATAR_GRADS.blue;
      const badgeHTML = a.badge
        ? `<span class="text-xs px-2 py-0.5 rounded-full font-semibold" style="background:rgba(0,0,0,.06);color:#475569">${a.badge}</span>`
        : '';
      const riskHTML    = a.risk_level ? riskPillHTML(a.risk_level, a.high_count || 0) : '';
      const concernHTML = a.top_concern
        ? `<div class="text-xs mt-0.5" style="color:#94a3b8;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
               title="${a.top_concern.replace(/"/g,'&quot;')}">${a.top_concern}</div>`
        : '';
      return `
        <div class="appt-row ${a.color}" id="appt-${a.id}" onclick="selectAppt(${a.id})">
          <div class="text-center w-14 flex-shrink-0">
            <div class="text-base font-black text-slate-800">${h12}:${min}</div>
            <div class="text-xs text-slate-400">${ampm}</div>
          </div>
          <div class="avatar flex-shrink-0" style="background:${grad}">${a.initials || '??'}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-bold text-slate-800">${a.patient_name}</span>
              ${badgeHTML}
              ${riskHTML}
            </div>
            <div class="text-sm text-slate-500 mt-0.5">${a.type} · ${a.duration} min</div>
            ${concernHTML}
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            ${statusBadgeHTML(a.id, a.status)}
            <button onclick="event.stopPropagation();openFillForm('${a.patient_id}','${a.patient_name.replace(/'/g,"\\'")}','${a.type.replace(/'/g,"\\'")}',${a.id})"
              class="text-xs px-2.5 py-1.5 rounded-lg font-semibold transition-colors"
              style="background:#f0fdfa;color:#0d9488;border:1px solid #99f6e4"
              title="Auto-fill AI form for this patient">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;margin-bottom:1px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
              Form
            </button>
          </div>
        </div>`;
    }

    // ── Load & render appointments ────────────────────────────────────────
    let _appointments = [];

    async function loadAppointments(dateStr) {
      const list = document.getElementById('apptList');
      list.innerHTML = `<div class="flex justify-center py-16"><div class="text-center text-slate-400">
        <div class="w-10 h-10 border-2 border-teal-300 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
        <p class="text-sm font-medium">Loading…</p></div></div>`;

      try {
        const r  = await fetch(`${API}/appointments/risk-sorted?date=${dateStr}`);
        const { appointments } = await r.json();
        _appointments = appointments;
        renderAppointments(appointments);
        updateSummary(appointments);
        updateSuggestions(appointments);
      } catch (e) {
        list.innerHTML = `<div class="bg-white rounded-2xl p-8 text-center text-slate-400">
          <p class="font-medium">Could not load appointments</p>
          <p class="text-xs mt-1">Is the server running? <code>uvicorn main:app</code></p>
        </div>`;
      }
    }

    function renderAppointments(appts) {
      const list = document.getElementById('apptList');
      if (!appts.length) {
        list.innerHTML = '<div class="bg-white rounded-2xl p-10 text-center text-slate-400"><p class="font-medium">No appointments for this day</p></div>';
        return;
      }

      const high   = appts.filter(a => a.risk_level === 'HIGH');
      const medium = appts.filter(a => a.risk_level === 'MEDIUM');
      const low    = appts.filter(a => !a.risk_level || a.risk_level === 'LOW');

      function sectionHeader(label, color, dotColor, borderColor, count, pulse) {
        return `<div class="flex items-center gap-3 mb-3 mt-2">
          <div class="flex items-center gap-1.5" style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:${color}">
            <div class="w-2 h-2 rounded-full" style="background:${dotColor}${pulse?';animation:statusPulse 2s ease infinite':''}"></div>
            ${label}
          </div>
          <div class="flex-1 h-px" style="background:${borderColor}"></div>
          <span style="font-size:11px;font-weight:700;color:${dotColor}">${count} patient${count>1?'s':''}</span>
        </div>`;
      }

      let html = '';
      if (high.length)   html += sectionHeader('Critical Priority','#dc2626','#ef4444','#fee2e2',high.length,true)   + high.map(apptRowHTML).join('')   + '<div class="h-4"></div>';
      if (medium.length) html += sectionHeader('Moderate Priority','#d97706','#f59e0b','#fde68a',medium.length,false) + medium.map(apptRowHTML).join('') + '<div class="h-4"></div>';
      if (low.length)    html += sectionHeader('Routine',          '#059669','#10b981','#d1fae5',low.length,false)    + low.map(apptRowHTML).join('');

      list.innerHTML = `<div class="space-y-3">${html}</div>`;
    }

    function updateSummary(appts) {
      const total     = appts.length;
      const completed = appts.filter(a => a.status === 'completed').length;
      const inProg    = appts.filter(a => a.status === 'in-progress').length;
      const upcoming  = appts.filter(a => a.status === 'upcoming').length;
      const duration  = appts.reduce((s,a) => s + (a.duration||20), 0);
      const pct       = total ? Math.round(((completed + inProg * 0.5) / total) * 100) : 0;

      document.getElementById('statusBadges').innerHTML = `
        ${inProg  ? `<div class="flex items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-sm border border-slate-100 text-sm"><div class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></div><span class="text-slate-600 font-medium">${inProg} in-progress</span></div>` : ''}
        <div class="flex items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-sm border border-slate-100 text-sm"><div class="w-2 h-2 rounded-full bg-emerald-400"></div><span class="text-slate-600 font-medium">${completed} completed</span></div>
        <div class="flex items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-sm border border-slate-100 text-sm"><div class="w-2 h-2 rounded-full bg-slate-300"></div><span class="text-slate-600 font-medium">${upcoming} upcoming</span></div>`;

      document.getElementById('summaryStats').innerHTML = `
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2 text-sm text-slate-600">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:#f0fdfa">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>Total patients
          </div>
          <span class="font-bold text-slate-800">${total}</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2 text-sm text-slate-600">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:#fffbeb">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>Time booked
          </div>
          <span class="font-bold text-slate-800">${Math.floor(duration/60)}h ${duration%60}m</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2 text-sm text-slate-600">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:#f0fdf4">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            </div>Completed
          </div>
          <span class="font-bold text-emerald-600">${completed}</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2 text-sm text-slate-600">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:#faf5ff">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
            </div>Remaining
          </div>
          <span class="font-bold text-amber-600">${upcoming + inProg}</span>
        </div>`;

      document.getElementById('progressPct').textContent = `${pct}%`;
      document.getElementById('progressBar').style.width = `${pct}%`;
    }

    // ── Status update ─────────────────────────────────────────────────────
    async function updateStatus(apptId, newStatus) {
      try {
        const r = await fetch(`${API}/appointments/${apptId}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus }),
        });
        if (!r.ok) throw new Error();
        const updated = await r.json();
        // Update local array
        const idx = _appointments.findIndex(a => a.id === apptId);
        if (idx !== -1) _appointments[idx] = updated;
        renderAppointments(_appointments);
        updateSummary(_appointments);
      } catch {
        alert('Could not update status. Check server is running.');
      }
    }

    // ── AI Suggestions (from loaded appointments) ─────────────────────────
    function updateSuggestions(appts) {
      const el = document.getElementById('aiSuggestions');
      const noteworthy = appts
        .filter(a => a.risk_level === 'HIGH' || a.risk_level === 'MEDIUM')
        .slice(0, 4);

      if (!noteworthy.length) {
        el.innerHTML = '<div class="px-5 py-6 text-center text-slate-400 text-xs font-medium">No clinical alerts for today</div>';
        return;
      }

      el.innerHTML = noteworthy.map(a => {
        const isHigh  = a.risk_level === 'HIGH';
        const color   = isHigh ? '#dc2626' : '#d97706';
        const icon    = isHigh ? '⚠' : '●';
        const label   = isHigh ? 'Critical' : 'Moderate';
        const concern = a.top_concern || a.type || 'Review needed';
        return `<div class="px-5 py-3.5">
          <p class="text-xs font-bold mb-0.5" style="color:${color}">${icon} ${label} — ${a.patient_name}</p>
          <p class="text-xs text-slate-600">${concern}</p>
        </div>`;
      }).join('');
    }

    // ── Open form filler for this patient ─────────────────────────────────
    function openFillForm(patientId, patientName, apptType, apptId) {
      sessionStorage.setItem('prefill_patient', patientId);
      sessionStorage.setItem('prefill_label', patientName);
      window.location.href = 'index.html';
    }

    // ── Appointment selection highlight ───────────────────────────────────
    function selectAppt(id) {
      document.querySelectorAll('.appt-row').forEach(r => r.classList.remove('selected'));
      const el = document.getElementById(`appt-${id}`);
      if (el) el.classList.add('selected');
    }

    // ── Week grid ─────────────────────────────────────────────────────────
    function buildWeekGrid(todayStr) {
      const today  = new Date(todayStr + 'T12:00:00');
      const monday = new Date(today);
      monday.setDate(today.getDate() - today.getDay() + 1); // Monday

      const dayNames = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
      let html = '';
      for (let i = 0; i < 7; i++) {
        const d    = new Date(monday);
        d.setDate(monday.getDate() + i);
        const ds   = d.toISOString().split('T')[0];
        const isT  = ds === todayStr;
        const dots = i < 5
          ? `<div class="mt-1.5 flex justify-center gap-0.5"><div class="w-1.5 h-1.5 rounded-full ${isT ? 'bg-white/60' : 'bg-teal-400'}"></div><div class="w-1.5 h-1.5 rounded-full ${isT ? 'bg-white/60' : 'bg-slate-200'}"></div></div>`
          : '';
        html += `
          <div class="week-day ${isT ? 'active' : ''}" onclick="switchDate('${ds}')">
            <div class="day-name">${dayNames[i]}</div>
            <div class="day-num">${d.getDate()}</div>
            ${dots}
          </div>`;
      }
      document.getElementById('weekGrid').innerHTML = html;

      const m = today.toLocaleString('default', { month: 'long', year: 'numeric' });
      document.getElementById('weekLabel').textContent = m;
    }

    let _currentDate = '';

    function switchDate(ds) {
      _currentDate = ds;
      // Update active day
      document.querySelectorAll('.week-day').forEach(el => {
        el.classList.toggle('active', el.getAttribute('onclick') === `switchDate('${ds}')`);
      });
      loadAppointments(ds);
    }

    // ── Boot ─────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      const ds  = now.toISOString().split('T')[0];
      _currentDate = ds;

      const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('todayLabel').textContent =
        `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()} · Dr. Anika Patel`;

      buildWeekGrid(ds);
      loadAppointments(ds);
    });
  </script>
</body>
